<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIc Question Bank</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --border: #e5e7eb;
  }
  [data-theme="dark"] {
    --bg: #111318;
    --card: #1b1e26;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #60a5fa;
    --accent-soft: #1e3a5f;
    --border: #2d313b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1.15rem; }
  header .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #search {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    width: 220px;
    font-size: 0.9rem;
  }
  .btn {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .layout { display: flex; max-width: 1100px; margin: 0 auto; gap: 20px; padding: 20px; }
  nav {
    flex: 0 0 230px;
    position: sticky;
    top: 78px;
    align-self: flex-start;
    max-height: calc(100vh - 98px);
    overflow-y: auto;
  }
  nav button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    margin-bottom: 4px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 0.92rem;
  }
  nav button:hover { background: var(--accent-soft); }
  nav button.active { background: var(--accent); color: #fff; }
  nav .count { color: var(--muted); font-size: 0.8rem; margin-left: 4px; }
  nav button.active .count { color: #e0e7ff; }
  main { flex: 1; min-width: 0; }
  .topic-block { margin-bottom: 28px; }
  .topic-block h2 {
    font-size: 1.05rem;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  .topic-block h2 .en { color: var(--muted); font-weight: normal; font-size: 0.9rem; margin-left: 8px; }
  .q {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .q-head { display: flex; align-items: baseline; gap: 8px; }
  .q .num { color: var(--accent); font-weight: 700; font-size: 0.8rem; flex: 0 0 auto; }
  .q .en { font-size: 0.98rem; }
  .q .ko { color: var(--muted); font-size: 0.88rem; margin-top: 4px; padding-left: 26px; }
  body.hide-ko .q .ko { display: none; }
  .badge {
    display: inline-block;
    font-size: 0.68rem;
    padding: 1px 7px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    margin-left: 6px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .badge.hint { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .tabs { max-width: 1100px; margin: 0 auto; padding: 14px 20px 0; display: flex; gap: 8px; }
  .tab {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    border-radius: 10px 10px 0 0;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .tab.active { background: var(--card); color: var(--accent); border-bottom-color: var(--card); }
  body.tab-strategy #search, body.tab-strategy #koToggle { display: none; }
  .strategy-wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
  .strat-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 18px;
  }
  .strat-block h2 {
    font-size: 1.05rem;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 6px;
    margin-bottom: 6px;
    display: inline-block;
  }
  .strat-block h2 .en { color: var(--muted); font-weight: normal; font-size: 0.85rem; margin-left: 8px; }
  .strat-desc { color: var(--muted); font-size: 0.9rem; margin: 8px 0 14px; }
  .strat-row { padding: 10px 0; border-top: 1px solid var(--border); }
  .strat-row:first-of-type { border-top: none; }
  .strat-step { font-weight: 700; color: var(--accent); font-size: 0.92rem; margin-bottom: 3px; }
  .strat-ko { font-size: 0.95rem; }
  .strat-en { font-size: 0.86rem; color: var(--muted); margin-top: 5px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }
  .strat-skeleton {
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-size: 0.86rem;
    line-height: 1.75;
  }
  .strat-skeleton > div { padding: 1px 0; }
  .strat-skeleton .lbl { color: var(--accent); font-weight: 600; }
  body.tab-strategy .ans-ctl { display: none; }
  .ans-toggle {
    margin-top: 8px;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    border-radius: 6px;
    padding: 3px 10px;
    cursor: pointer;
  }
  .ans-toggle.has-answer { color: var(--accent); border-color: var(--accent); font-weight: 600; }
  .ans-box { margin-top: 8px; }
  .ans-box textarea {
    width: 100%;
    min-height: 96px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    padding: 9px 11px;
    font-size: 0.92rem;
    font-family: inherit;
    line-height: 1.7;
  }
  .ans-tools { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  .ans-tools button {
    font-size: 0.78rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    border-radius: 6px;
    padding: 2px 9px;
    cursor: pointer;
  }
  .ans-saved { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
  .notice {
    max-width: 1100px;
    margin: 14px auto 0;
    padding: 11px 16px;
    background: var(--accent-soft);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .notice b { color: var(--accent); }
  .notice button {
    margin-left: auto;
    flex: 0 0 auto;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    border-radius: 6px;
    padding: 4px 11px;
    cursor: pointer;
    font-size: 0.8rem;
    white-space: nowrap;
  }
  @media (max-width: 720px) {
    .notice { flex-direction: column; align-items: flex-start; }
    .notice button { margin-left: 0; }
  }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 24px; }
  @media (max-width: 720px) {
    .layout { flex-direction: column; }
    nav { position: static; max-height: none; display: flex; flex-wrap: wrap; gap: 6px; }
    nav button { width: auto; }
    #search { width: 150px; }
  }
</style>
</head>
<body>
<header>
  <h1>OPIc Question Bank</h1>
  <div class="controls">
    <input id="search" type="search" placeholder="문제 검색 (영/한)...">
    <button id="exportBtn" class="btn ans-ctl" title="내 답변 파일로 내보내기">⬇ 내보내기</button>
    <label class="btn ans-ctl" title="내 답변 파일에서 가져오기">⬆ 가져오기<input id="importFile" type="file" accept="application/json" hidden></label>
    <button id="koToggle" class="btn on" title="한글 번역 표시/숨김">한글</button>
    <button id="themeToggle" class="btn" title="테마 전환">◐</button>
  </div>
</header>
<div class="tabs">
  <button id="tab-questions" class="tab active">질문 은행</button>
  <button id="tab-strategy" class="tab">답변 전략</button>
</div>
<div id="view-questions">
  <div id="notice" class="notice" hidden>
    <span>✏️ 각 문제의 <b>내 답변</b>은 <b>이 기기(브라우저)에만</b> 저장돼요 — 서버 전송·다른 사람 공유 없음. 백업하거나 다른 기기로 옮기려면 상단 <b>내보내기 / 가져오기</b>를 쓰세요.</span>
    <button id="noticeClose" title="닫기">알겠어요 ✕</button>
  </div>
  <div class="layout">
    <nav id="topicNav"></nav>
    <main id="content"><div class="empty">Loading...</div></main>
  </div>
</div>
<div id="view-strategy" hidden>
  <div class="strategy-wrap" id="strategyContent"><div class="empty">Loading...</div></div>
</div>
<footer>내 답변은 이 브라우저에만 저장돼요 · 서버 전송 없음 · personal study use</footer>
<script>
let DATA = null;
let activeTopic = 'all';

const TYPE_LABEL = {
  description: '묘사',
  past_experience: '과거경험',
  comparison: '비교',
  routine: '루틴/습관',
  roleplay: '롤플레이',
  current_issue: '시사이슈',
  general: '일반'
};

let ANSWERS = {};
try { ANSWERS = JSON.parse(localStorage.getItem('opic-answers') || '{}') || {}; } catch (e) { ANSWERS = {}; }
let SKEL = {};
function hashKey(s) { let h = 5381; for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0; return h.toString(36); }
function saveAnswers() { try { localStorage.setItem('opic-answers', JSON.stringify(ANSWERS)); } catch (e) {} }

async function load() {
  const res = await fetch('data/questions.json');
  DATA = await res.json();
  document.title = DATA.meta.title;
  renderNav();
  render();
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function renderNav() {
  const nav = document.getElementById('topicNav');
  const total = DATA.topics.reduce((s, t) => s + t.questions.length, 0);
  let html = `<button data-id="all" class="active">전체 <span class="count">${total}</span></button>`;
  for (const t of DATA.topics) {
    html += `<button data-id="${t.id}">${esc(t.nameKo)} <span class="count">${t.questions.length}</span></button>`;
  }
  nav.innerHTML = html;
  nav.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    activeTopic = b.dataset.id;
    nav.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    render();
  }));
}

function render() {
  const kw = document.getElementById('search').value.trim().toLowerCase();
  const main = document.getElementById('content');
  const topics = DATA.topics.filter(t => activeTopic === 'all' || t.id === activeTopic);
  let html = '';
  for (const t of topics) {
    const qs = t.questions.filter(q =>
      !kw || q.en.toLowerCase().includes(kw) || (q.ko && q.ko.toLowerCase().includes(kw)));
    if (!qs.length) continue;
    html += `<section class="topic-block"><h2>${esc(t.nameKo)}<span class="en">${esc(t.nameEn || '')}</span></h2>`;
    qs.forEach((q, i) => {
      const badge = q.type ? `<span class="badge">${TYPE_LABEL[q.type] || q.type}</span>` : '';
      const hint = q.topicHint ? `<span class="badge hint">${esc(q.topicHint)}</span>` : '';
      const key = hashKey(q.en);
      const has = (ANSWERS[key] && ANSWERS[key].trim()) ? ' has-answer' : '';
      html += `<div class="q" data-qkey="${key}" data-qtype="${esc(q.type || '')}">` +
              `<div class="q-head"><span class="num">Q${i + 1}</span><span class="en">${esc(q.en)}${badge}${hint}</span></div>` +
              (q.ko ? `<div class="ko">${esc(q.ko)}</div>` : '') +
              `<button class="ans-toggle${has}">✏️ 내 답변</button>` +
              `<div class="ans-box" hidden></div>` +
              `</div>`;
    });
    html += `</section>`;
  }
  main.innerHTML = html || '<div class="empty">일치하는 문제가 없습니다.</div>';
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('themeToggle').addEventListener('click', () => {
  const root = document.documentElement;
  const next = root.dataset.theme === 'dark' ? '' : 'dark';
  if (next) root.dataset.theme = next; else delete root.dataset.theme;
  localStorage.setItem('opic-theme', next);
});
document.getElementById('koToggle').addEventListener('click', (e) => {
  const hidden = document.body.classList.toggle('hide-ko');
  e.target.classList.toggle('on', !hidden);
  localStorage.setItem('opic-hideko', hidden ? '1' : '');
});
if (localStorage.getItem('opic-theme') === 'dark') document.documentElement.dataset.theme = 'dark';
if (localStorage.getItem('opic-hideko') === '1') {
  document.body.classList.add('hide-ko');
  document.getElementById('koToggle').classList.remove('on');
}

let STRAT = null;
async function loadStrategy() {
  const res = await fetch('data/strategies.json');
  STRAT = await res.json();
  SKEL = {};
  for (const s of STRAT.sections) for (const r of (s.rows || [])) if (r.type && r.skeleton) SKEL[r.type] = r.skeleton;
  const el = document.getElementById('strategyContent');
  let html = '';
  for (const s of STRAT.sections) {
    html += `<section class="strat-block"><h2>${esc(s.nameKo)}<span class="en">${esc(s.nameEn || '')}</span></h2>`;
    if (s.desc) html += `<p class="strat-desc">${esc(s.desc)}</p>`;
    for (const r of s.rows) {
      html += `<div class="strat-row"><div class="strat-step">${esc(r.step)}</div><div class="strat-ko">${esc(r.ko)}</div>` +
              (r.en ? `<div class="strat-en">${esc(r.en)}</div>` : '') +
              (r.skeleton ? `<div class="strat-skeleton">${r.skeleton.map(l => `<div>${esc(l)}</div>`).join('')}</div>` : '') +
              `</div>`;
    }
    html += `</section>`;
  }
  el.innerHTML = html;
}

function switchTab(which) {
  const q = which === 'questions';
  document.getElementById('view-questions').hidden = !q;
  document.getElementById('view-strategy').hidden = q;
  document.getElementById('tab-questions').classList.toggle('active', q);
  document.getElementById('tab-strategy').classList.toggle('active', !q);
  document.body.classList.toggle('tab-strategy', !q);
}
document.getElementById('tab-questions').addEventListener('click', () => switchTab('questions'));
document.getElementById('tab-strategy').addEventListener('click', () => switchTab('strategy'));

document.getElementById('content').addEventListener('click', (e) => {
  const btn = e.target.closest('.ans-toggle');
  if (!btn) return;
  const qEl = btn.closest('.q');
  const box = qEl.querySelector('.ans-box');
  if (!box.hidden) { box.hidden = true; return; }
  box.hidden = false;
  if (box.dataset.built) return;
  box.dataset.built = '1';
  const key = qEl.dataset.qkey;
  const type = qEl.dataset.qtype;
  const ta = document.createElement('textarea');
  ta.placeholder = '여기에 내 답변을 작성하세요…';
  ta.value = ANSWERS[key] || '';
  ta.addEventListener('input', () => {
    ANSWERS[key] = ta.value;
    saveAnswers();
    btn.classList.toggle('has-answer', !!ta.value.trim());
  });
  const tools = document.createElement('div');
  tools.className = 'ans-tools';
  const skelBtn = document.createElement('button');
  skelBtn.textContent = '골격 넣기';
  skelBtn.addEventListener('click', () => {
    const sk = SKEL[type];
    if (sk && !ta.value.trim()) { ta.value = sk.join('\n'); ta.dispatchEvent(new Event('input')); }
    ta.focus();
  });
  if (!SKEL[type]) skelBtn.style.display = 'none';
  const clrBtn = document.createElement('button');
  clrBtn.textContent = '지우기';
  clrBtn.addEventListener('click', () => { ta.value = ''; ta.dispatchEvent(new Event('input')); ta.focus(); });
  const saved = document.createElement('span');
  saved.className = 'ans-saved';
  saved.textContent = '이 브라우저에만 저장';
  tools.append(skelBtn, clrBtn, saved);
  box.append(ta, tools);
  ta.focus();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(ANSWERS, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'opic-my-answers.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
});
document.getElementById('importFile').addEventListener('change', (e) => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
        Object.assign(ANSWERS, obj);
        saveAnswers();
        render();
        alert('내 답변을 가져왔어요.');
      } else { alert('올바른 답변 파일이 아니에요.'); }
    } catch (err) { alert('가져오기 실패: 올바른 JSON 파일이 아니에요.'); }
    e.target.value = '';
  };
  reader.readAsText(f);
});

const noticeEl = document.getElementById('notice');
if (localStorage.getItem('opic-notice') !== 'off') noticeEl.hidden = false;
document.getElementById('noticeClose').addEventListener('click', () => {
  noticeEl.hidden = true;
  localStorage.setItem('opic-notice', 'off');
});

load();
loadStrategy();
</script>
</body>
</html>
